<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EquipTrack - Asset Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --espn-red: #CC0000;
            --espn-black: #000000;
            --espn-blue: #3c78e6;
            --espn-grey: #f2f2f2;
        }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .active-nav { background-color: white; color: var(--espn-red) !important; font-weight: 800; border-radius: 0 50px 50px 0; margin-right: -1rem; }
        .active-nav .lucide { color: var(--espn-red); }
        .active-nav-mobile { color: var(--espn-red); border-bottom: 4px solid var(--espn-red); padding-bottom: 4px; }
        
        .modal-backdrop { background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); }
        #loading-overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hidden-overlay { opacity: 0; pointer-events: none; visibility: hidden; transition: opacity 0.3s; }
        
        .sortable { cursor: pointer; transition: background 0.2s; }
        .sortable:hover { background-color: #f8fafc; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-[#f2f2f2] min-h-screen flex flex-col md:flex-row pb-20 md:pb-0 text-left">

    <div id="loading-overlay">
        <div class="w-14 h-14 border-4 border-[#CC0000] border-t-transparent rounded-full animate-spin mb-6"></div>
        <p class="text-black font-black uppercase tracking-tighter text-xl italic text-left">EquipTrack</p>
        <p id="loading-text" class="text-slate-400 text-xs font-bold mt-2 uppercase tracking-widest text-left">Syncing Asset Roster...</p>
        <button id="bypass-btn" class="mt-8 px-8 py-3 bg-[#CC0000] text-white text-xs font-black uppercase tracking-widest rounded-full hidden">Local Bypass</button>
    </div>

    <input type="file" id="system-restore-input" class="hidden" accept=".xlsx" onchange="processSystemRestore(this)">

    <aside class="hidden md:flex w-64 bg-[#CC0000] flex-col h-screen sticky top-0 shadow-2xl overflow-hidden">
        <div class="p-6 cursor-pointer group" onclick="setView('dashboard')">
            <div class="flex items-center gap-2">
                <i data-lucide="package" class="text-white w-7 h-7 group-hover:rotate-12 transition-transform"></i>
                <h1 class="font-black text-2xl text-white italic tracking-tighter leading-none">EquipTrack</h1>
            </div>
        </div>
        
        <nav class="space-y-1 flex-1 pl-4">
            <button onclick="setView('dashboard')" data-view="dashboard" class="nav-btn w-full flex items-center gap-3 px-5 py-3 text-white/80 transition-all hover:text-white font-bold text-sm uppercase tracking-wide text-left">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
            </button>
            <button onclick="setView('inventory')" data-view="inventory" class="nav-btn w-full flex items-center gap-3 px-5 py-3 text-white/80 transition-all hover:text-white font-bold text-sm uppercase tracking-wide text-left">
                <i data-lucide="layers" class="w-4 h-4"></i> Inventory
            </button>
            <button onclick="setView('checkouts')" data-view="checkouts" class="nav-btn w-full flex items-center gap-3 px-5 py-3 text-white/80 transition-all hover:text-white font-bold text-sm uppercase tracking-wide text-left">
                <i data-lucide="clock" class="w-4 h-4"></i> Active Loans
            </button>
            <button onclick="setView('employees')" data-view="employees" class="nav-btn w-full flex items-center gap-3 px-5 py-3 text-white/80 transition-all hover:text-white font-bold text-sm uppercase tracking-wide text-left">
                <i data-lucide="users" class="w-4 h-4"></i> Employees
            </button>
        </nav>

        <div class="p-4 mt-auto">
            <div class="bg-black/20 rounded-xl p-4 border border-white/10 text-left">
                <p class="text-[9px] font-black text-white/40 uppercase tracking-widest mb-3 italic text-left">Administration</p>
                <div class="flex flex-col gap-2 items-start">
                    <button onclick="exportSystemData()" class="flex items-center justify-start gap-2 text-[10px] font-black text-white hover:text-white/70 uppercase w-full text-left">
                        <i data-lucide="download" class="w-3 h-3"></i> Export All
                    </button>
                    <button onclick="triggerSystemRestore()" class="flex items-center justify-start gap-2 text-[10px] font-black text-white hover:text-white/70 uppercase w-full text-left">
                        <i data-lucide="upload" class="w-3 h-3"></i> Restore Backup
                    </button>
                </div>
            </div>
            <div class="mt-4 flex items-center gap-2 px-2">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-white/20"></div>
                <span id="status-text" class="text-[9px] font-black text-white/40 uppercase tracking-widest text-left">Connecting...</span>
            </div>
        </div>
    </aside>

    <header class="md:hidden bg-[#CC0000] px-5 py-4 sticky top-0 z-40 flex items-center justify-between shadow-xl text-left">
        <div class="flex items-center gap-2 cursor-pointer" onclick="setView('dashboard')">
            <h1 class="font-black text-xl text-white italic tracking-tighter uppercase">EquipTrack</h1>
        </div>
        <div id="mobile-status-dot" class="w-2.5 h-2.5 rounded-full bg-white/30 border-2 border-white/10"></div>
    </header>

    <main class="flex-1 p-4 md:p-6 overflow-y-auto">
        <header class="mb-6">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 text-left">
                <div class="flex items-center gap-4 flex-1">
                    <div class="relative flex-1 max-w-xl text-left">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="search-input" placeholder="Search items, serials, staff..." class="w-full pl-11 pr-6 py-3 bg-white border-none rounded-xl text-sm font-medium shadow-sm focus:ring-4 focus:ring-black/5 outline-none text-left" oninput="handleSearch(this.value)" />
                    </div>
                    
                    <div class="hidden md:block relative text-left">
                        <button id="add-new-btn" onclick="toggleAddDropdown(event)" class="bg-[#3c78e6] hover:bg-[#2a5bbd] text-white px-6 py-3 rounded-xl text-xs font-black uppercase tracking-widest flex items-center gap-2 transition-all shadow-lg shadow-blue-500/20">
                            <i data-lucide="plus" class="w-4 h-4 text-left"></i> Add New
                        </button>
                        <div id="add-dropdown" class="hidden absolute right-0 mt-2 w-52 bg-black rounded-2xl shadow-2xl z-[100] p-1.5 border border-white/10">
                            <button onclick="openItemModal();" class="flex items-center gap-3 w-full px-4 py-2 text-xs font-black text-white uppercase tracking-widest hover:bg-white/10 rounded-lg transition-colors">
                                <i data-lucide="box" class="w-4 h-4 text-[#CC0000]"></i> Inventory Item
                            </button>
                            <button onclick="openEmployeeModal();" class="flex items-center gap-3 w-full px-4 py-2 text-xs font-black text-white uppercase tracking-widest hover:bg-white/10 rounded-lg transition-colors mt-1">
                                <i data-lucide="users" class="w-4 h-4 text-[#CC0000]"></i> Employee Record
                            </button>
                        </div>
                    </div>
                </div>

                <div id="filter-toolbar" class="flex items-center">
                    <div class="bg-white text-black border border-slate-200 px-3 py-2 rounded-xl flex items-center gap-2 shadow-sm">
                        <i data-lucide="filter" class="w-3.5 h-3.5 text-[#CC0000]"></i>
                        <select id="cat-filter" onchange="updateFilters('cat', this.value)" class="bg-transparent text-[10px] font-black uppercase tracking-widest outline-none cursor-pointer text-slate-900 border-none ring-0">
                            <option value="All">All Categories</option>
                            <option value="Laptop">Laptop</option>
                            <option value="Docking Station">Docking Station</option>
                            <option value="Headset">Headset</option>
                            <option value="Monitor">Monitor</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <div id="content-area" class="space-y-4"></div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-black flex justify-around items-center z-40 pb-safe shadow-2xl">
        <button onclick="setView('dashboard')" data-m-view="dashboard" class="mobile-nav-btn flex flex-col items-center py-4 px-4 text-white/40">
            <i data-lucide="layout-dashboard" class="w-5 h-5 mb-1"></i>
            <span class="text-[8px] font-black uppercase tracking-widest">Home</span>
        </button>
        <button onclick="setView('inventory')" data-m-view="inventory" class="mobile-nav-btn flex flex-col items-center py-4 px-4 text-white/40">
            <i data-lucide="layers" class="w-5 h-5 mb-1"></i>
            <span class="text-[8px] font-black uppercase tracking-widest">Items</span>
        </button>
        <button onclick="setView('checkouts')" data-m-view="checkouts" class="mobile-nav-btn flex flex-col items-center py-4 px-4 text-white/40">
            <i data-lucide="clock" class="w-5 h-5 mb-1 text-left"></i>
            <span class="text-[8px] font-black uppercase tracking-widest">Loans</span>
        </button>
        <button onclick="setView('employees')" data-m-view="employees" class="mobile-nav-btn flex flex-col items-center py-4 px-4 text-white/40">
            <i data-lucide="users" class="w-5 h-5 mb-1"></i>
            <span class="text-[8px] font-black uppercase tracking-widest">Staff</span>
        </button>
    </nav>

    <button onclick="toggleMobileAddMenu()" class="md:hidden fixed bottom-24 right-6 w-14 h-14 bg-[#3c78e6] text-white rounded-full shadow-2xl flex items-center justify-center z-50">
        <i data-lucide="plus" class="w-7 h-7"></i>
    </button>

    <div id="mobile-add-menu" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="toggleMobileAddMenu()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[3rem] p-10 pb-16 animate-slide-up border-t-8 border-t-[#CC0000]">
            <div class="w-16 h-1.5 bg-slate-100 rounded-full mx-auto mb-10 text-left"></div>
            <div class="grid grid-cols-2 gap-6 text-left">
                <button onclick="openItemModal(); toggleMobileAddMenu();" class="flex flex-col items-center gap-4 p-8 bg-slate-50 rounded-[2rem] border border-slate-100 shadow-sm active:scale-95 transition-transform">
                    <div class="w-16 h-16 bg-[#CC0000] text-white rounded-[1.5rem] flex items-center justify-center shadow-xl shadow-red-500/20"><i data-lucide="box" class="w-8 h-8"></i></div>
                    <span class="text-xs font-black text-black uppercase tracking-widest">Add Item</span>
                </button>
                <button onclick="openEmployeeModal(); toggleMobileAddMenu();" class="flex flex-col items-center gap-4 p-8 bg-slate-50 rounded-[2rem] border border-slate-100 shadow-sm active:scale-95 transition-transform">
                    <div class="w-16 h-16 bg-black text-white rounded-[1.5rem] flex items-center justify-center shadow-xl"><i data-lucide="user-plus" class="w-8 h-8"></i></div>
                    <span class="text-xs font-black text-black uppercase tracking-widest">Add Staff</span>
                </button>
            </div>
        </div>
    </div>

    <div id="item-modal" class="fixed inset-0 modal-backdrop z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden border-t-[8px] border-t-[#CC0000] text-left">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center bg-white">
                <h3 class="text-2xl font-black text-black italic tracking-tighter">ITEM ENTRY</h3>
                <button onclick="closeModal('item-modal')" class="p-2 bg-slate-50 rounded-full"><i data-lucide="x" class="w-4 h-4 text-slate-400"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-2">
                        <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Model Name</label>
                        <input type="text" id="item-name" list="model-suggestions" class="w-full p-3.5 bg-slate-100 border-none rounded-xl text-sm font-bold outline-none" />
                        <datalist id="model-suggestions"></datalist>
                    </div>
                    <div><label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Qty</label><input type="number" id="item-qty" min="1" value="1" oninput="handleBulkInputToggle(this.value)" class="w-full p-3.5 bg-slate-100 border-none rounded-xl text-sm font-bold outline-none" /></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1 text-left">Category</label><select id="item-category" class="w-full p-3.5 bg-slate-100 border-none rounded-xl text-sm font-bold outline-none"><option value="Laptop">Laptop</option><option value="Docking Station">Docking Station</option><option value="Headset">Headset</option><option value="Monitor">Monitor</option><option value="Other">Other</option></select></div>
                    <div><label id="ln-label" class="block text-[9px] font-black text-slate-400 uppercase mb-1.5 ml-1 tracking-widest text-left">Laptop ID</label><input type="text" id="item-ln" class="w-full p-3.5 bg-slate-100 border-none rounded-xl text-sm font-bold outline-none" /></div>
                </div>
                <div><label id="sn-label" class="block text-[9px] font-black text-slate-400 uppercase mb-1.5 ml-1 tracking-widest text-left">Serial Number</label><input type="text" id="item-serial" class="w-full p-3.5 bg-slate-100 border-none rounded-xl text-sm font-bold outline-none" /></div>
                
                <div id="assign-field-container">
                    <label class="block text-[9px] font-black text-[#3c78e6] uppercase tracking-widest mb-1.5 ml-1 text-left">Initial Assignment (Optional)</label>
                    <select id="item-assign-to" class="w-full p-3.5 bg-blue-50 border-none rounded-xl text-sm font-bold outline-none text-[#3c78e6]"></select>
                </div>

                <p id="bulk-warning" class="hidden text-[10px] text-[#CC0000] font-black bg-red-50 p-4 rounded-xl leading-relaxed uppercase border border-red-100 italic">Bulk mode: Assignment and ID fields disabled. Update details in Inventory view.</p>
            </div>
            <div class="p-6 bg-slate-50 flex gap-4"><button onclick="closeModal('item-modal')" class="flex-1 py-4 font-black uppercase text-xs tracking-widest text-slate-400">Cancel</button><button onclick="saveItem()" class="flex-1 py-4 bg-black text-white rounded-xl font-black uppercase text-xs tracking-widest">Save</button></div>
        </div>
    </div>

    <div id="bulk-checkout-modal" class="fixed inset-0 modal-backdrop z-[150] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh] border-t-[8px] border-t-[#3c78e6]">
            <div class="p-6 border-b border-slate-50 bg-white flex justify-between items-center text-left">
                <div class="text-left">
                    <h3 class="text-2xl font-black text-black italic tracking-tighter uppercase text-left">Bulk Assignment</h3>
                    <p id="bulk-checkout-subtitle" class="text-[10px] text-[#3c78e6] font-black mt-1 uppercase tracking-widest text-left"></p>
                </div>
                <button onclick="toggleBulkSelectAll()" id="bulk-select-all-btn" class="px-5 py-2 bg-slate-100 text-black rounded-lg text-[9px] font-black uppercase tracking-widest text-left">Select All Staff</button>
            </div>
            <div class="p-4 border-b bg-slate-50 text-left">
                <div class="relative"><i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300"></i><input type="text" id="bulk-staff-search" placeholder="Search staff members..." oninput="renderBulkStaffList(this.value)" class="w-full pl-11 pr-4 py-3 bg-white border-none rounded-xl text-sm font-bold outline-none shadow-sm" /></div>
            </div>
            <div class="overflow-y-auto flex-1 p-4 grid grid-cols-1 md:grid-cols-2 gap-2 text-left" id="bulk-staff-list"></div>
            <div id="bulk-stock-warning" class="hidden px-6 py-2 bg-red-600 text-white text-[9px] font-black text-center uppercase tracking-widest text-left">STOCK EXCEEDED</div>
            <div class="p-6 bg-white border-t flex items-center justify-between text-left">
                <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Allocated</p><p class="text-xl font-black text-black"><span id="bulk-total-requested">0</span> <span class="text-slate-200">/</span> <span id="bulk-max-stock" class="text-[#3c78e6]">0</span></p></div>
                <div class="flex gap-3"><button onclick="closeModal('bulk-checkout-modal')" class="px-6 py-3 font-black uppercase text-[10px] tracking-widest text-slate-400">Abort</button><button id="bulk-execute-btn" onclick="confirmBulkCheckout()" class="px-8 py-3 bg-[#3c78e6] text-white rounded-xl font-black uppercase text-[10px] tracking-widest shadow-lg disabled:opacity-20">Execute</button></div>
            </div>
        </div>
    </div>

    <div id="history-modal" class="fixed inset-0 modal-backdrop z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col max-h-[85vh] border-t-[8px] border-t-black">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center bg-white text-left">
                <h3 id="history-modal-title" class="text-2xl font-black italic text-black tracking-tighter uppercase">HISTORY</h3>
                <button onclick="closeModal('history-modal')" class="p-2 bg-slate-50 rounded-full"><i data-lucide="x" class="w-4 h-4 text-slate-400"></i></button>
            </div>
            <div class="overflow-y-auto flex-1"><table class="w-full text-left"><thead class="bg-slate-100 text-[10px] uppercase font-black text-slate-500 sticky top-0 z-10 border-b"><tr><th id="history-th-1" class="px-6 py-4 tracking-widest">Borrower / Item</th><th class="px-6 py-4 tracking-widest">Timeline</th><th class="px-6 py-4 text-right pr-6 tracking-widest">Status</th></tr></thead><tbody id="history-table-body" class="divide-y divide-slate-100"></tbody></table></div>
        </div>
    </div>

    <div id="checkout-modal" class="fixed inset-0 modal-backdrop z-[110] hidden flex items-end md:items-center justify-center p-0 md:p-4 text-left">
        <div class="bg-white rounded-t-[3rem] md:rounded-[3rem] shadow-2xl w-full max-w-md overflow-hidden pb-10 md:pb-0 border-t-[12px] border-t-[#3c78e6]">
            <div class="p-6 border-b border-slate-50 bg-white"><h3 class="text-3xl font-black italic text-black uppercase">Assign Item</h3><p id="modal-item-info" class="text-xs text-[#3c78e6] font-black mt-2 uppercase tracking-widest leading-relaxed"></p></div>
            <div class="p-6 space-y-6">
                <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1 italic text-left">Select Borrower</label><select id="modal-employee-select" class="w-full p-4 bg-slate-100 border-none rounded-xl text-sm font-black outline-none focus:ring-4 focus:ring-blue-500/10"></select></div>
                <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1 italic text-left">Due Date</label><input type="date" id="modal-due-date" class="w-full p-4 bg-slate-100 border-none rounded-xl text-sm font-black outline-none focus:ring-4 focus:ring-blue-500/10" /></div>
            </div>
            <div class="p-6 flex gap-4 bg-slate-50"><button onclick="closeModal('checkout-modal')" class="flex-1 py-4 font-black uppercase text-xs tracking-widest text-slate-400">Cancel</button><button onclick="confirmCheckout()" class="flex-1 py-4 bg-[#3c78e6] text-white rounded-xl font-black uppercase text-xs tracking-widest shadow-xl shadow-blue-500/20">Finalize</button></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDS_XhPU9WT1XdJj5JCHwwGrKu9goJx01g",
          authDomain: "equipment-tracker-6717.firebaseapp.com",
          projectId: "equipment-tracker-6717",
          storageBucket: "equipment-tracker-6717.firebasestorage.app",
          messagingSenderId: "1086542719557",
          appId: "1:1086542719557:web:49d7318c74e59e5050d12c"
        };

        const renderStatCard = (l, v, i, bg, c) => `<div class="bg-white p-5 rounded-[1.5rem] border border-slate-100 flex items-center gap-4 shadow-sm text-left"><div class="${bg} ${c} p-3.5 rounded-2xl shadow-sm"><i data-lucide="${i}" class="w-6 h-6"></i></div><div><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 leading-none">${l}</p><p class="text-2xl font-black text-black leading-none tracking-tighter italic">${v}</p></div></div>`;

        window.currentView = 'dashboard';
        window.searchQuery = '';
        window.inventory = []; window.employees = []; window.checkouts = []; window.isLocalMode = false; 
        window.expandedEmployees = new Set();
        window.expandedInventoryModels = new Set();
        window.bulkSelectionMap = new Map();
        window.currentBulkModel = '';
        window.filters = { cat: 'All' };
        window.sort = { field: 'name', dir: 'asc' };
        let db, auth;

        window.dismissLoading = () => document.getElementById('loading-overlay')?.classList.add('hidden-overlay');
        
        window.switchToLocalMode = () => {
            window.isLocalMode = true;
            document.getElementById('status-dot')?.classList.add('bg-orange-500');
            window.inventory = JSON.parse(localStorage.getItem('et_inventory') || '[]');
            window.employees = JSON.parse(localStorage.getItem('et_employees') || '[]');
            window.checkouts = JSON.parse(localStorage.getItem('et_checkouts') || '[]');
            window.dismissLoading(); window.render();
        };

        const init = async () => {
            try {
                const app = initializeApp(firebaseConfig); auth = getAuth(app); db = getFirestore(app);
                await signInAnonymously(auth); onAuthStateChanged(auth, user => { if (user) setupListeners(); });
            } catch (e) { window.switchToLocalMode(); }
        };

        const setupListeners = () => {
            const check = () => { 
                const d = document.getElementById('status-dot');

        window.triggerSystemRestore = () => document.getElementById('system-restore-input').click();

                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const importSheet = async (sn, col, fm) => {
                    const ws = workbook.Sheets[sn]; if (!ws) return [];
                    const json = XLSX.utils.sheet_to_json(ws);
                    for (const row of json) {
                        const entry = {}; fm.forEach(f => entry[f.local] = row[f.excel] || "");
                        const id = row.ID || (Date.now().toString() + Math.random());
                        if (window.isLocalMode) window[col].push({id, ...entry}); else await setDoc(doc(db, col, id.toString()), entry);
                    }
                };
                await importSheet("Inventory", "inventory", [{local:'name',excel:'Model'},{local:'category',excel:'Category'},{local:'lnNumber',excel:'LN'},{local:'serial',excel:'SN'},{local:'status',excel:'Status'}]);
                await importSheet("Employees", "employees", [{local:'name',excel:'Name'},{local:'department',excel:'Dept'}]);

            const name = document.getElementById('item-name').value;

            const ln = document.getElementById('item-ln').value;

                    const data = { name, category, lnNumber: qty > 1 ? "" : ln, serial: qty > 1 ? "" : sn, status: isAssigned ? 'checked-out' : 'available' };
                    if (window.isLocalMode) { window.inventory.push({id, ...data}); } else { await setDoc(doc(db, 'inventory', id), data); }

                const idx = window.employees.findIndex(e => e.id === id);

        window.renderBulkStaffList = (search = '') => {
            const container = document.getElementById('bulk-staff-list');

            container.innerHTML = filtered.map(e => {

                </div>`;

        window.toggleBulkStaff = (id) => {

            window.validateBulkStock();

        window.changeBulkQty = (id, delta) => {
            let cur = window.bulkSelectionMap.get(id) || 0;
            let nxt = Math.max(0, cur + delta);
            if (nxt === 0) window.bulkSelectionMap.delete(id); else window.bulkSelectionMap.set(id, nxt);
            window.renderBulkStaffList(document.getElementById('bulk-staff-search').value);
            window.validateBulkStock();
        };

        window.toggleBulkSelectAll = () => {
            const isAll = window.bulkSelectionMap.size === window.employees.length;
            if (isAll) window.bulkSelectionMap.clear(); else window.employees.forEach(e => window.bulkSelectionMap.set(e.id, 1));
            window.renderBulkStaffList(document.getElementById('bulk-staff-search').value);
            window.validateBulkStock();
        };

        window.validateBulkStock = () => {
            const req = Array.from(window.bulkSelectionMap.values()).reduce((a, b) => a + b, 0);
            const stk = parseInt(document.getElementById('bulk-max-stock').innerText) || 0;
            const counter = document.getElementById('bulk-total-requested');
            if(counter) counter.innerText = req;
            const btn = document.getElementById('bulk-execute-btn');
            if(btn) btn.disabled = (req > stk || req === 0);
            document.getElementById('bulk-stock-warning')?.classList.toggle('hidden', req <= stk);
        };

            const selections = Array.from(window.bulkSelectionMap.entries());
            const availUnits = window.inventory.filter(i => i.name === window.currentBulkModel && i.status === 'available');
            let uIdx = 0;
            for (const [empId, qty] of selections) {
                const empName = window.employees.find(e=>e.id===empId)?.name;
                for (let i = 0; i < qty; i++) {
                    const unit = availUnits[uIdx++];
                    if (!unit) break;
                    const loan = { itemId: unit.id, employeeId: empId, empName, checkoutDate: new Date().toISOString().split('T')[0], status: 'active' };
                    if (window.isLocalMode) { window.checkouts.push({id: 'c'+Date.now()+uIdx, ...loan}); window.inventory.find(inv=>inv.id===unit.id).status = 'checked-out'; }
                    else { await setDoc(doc(db, 'checkouts', 'c'+Date.now()+uIdx), loan); await updateDoc(doc(db, 'inventory', unit.id), { status: 'checked-out' }); }
                }
            }

            window.closeModal('bulk-checkout-modal');

            if (s) { s.innerHTML = '<option value="">SEARCH STAFF...</option>' + window.employees.sort((a,b)=>a.name.localeCompare(b.name)).map(e => `<option value="${e.id}">${e.name}</option>`).join(''); }
            document.getElementById('checkout-modal')?.classList.remove('hidden');

            else { await updateDoc(doc(db, 'checkouts', lid), { status: 'returned', returnDate: new Date().toISOString().split('T')[0] }); await updateDoc(doc(db, 'inventory', loan.itemId), { status: 'available' }); }

        window.openUnitHistory = (unitId) => {

            }).join('') : '<tr><td colspan="3" class="p-10 text-center italic text-slate-400 font-black text-[10px] uppercase">No logs registered.</td></tr>';
            document.getElementById('history-modal').classList.remove('hidden'); if(window.lucide) lucide.createIcons();

        window.toggleEmployeeGroup = (id) => { if (window.expandedEmployees.has(id)) window.expandedEmployees.delete(id); else window.expandedEmployees.add(id); window.render(); };

            document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.toggle('active-nav-mobile', b.dataset.mView === window.currentView));
            const area = document.getElementById('content-area');

            if (window.currentView === 'dashboard') {
                const qLoans = actives.filter(l => {
                    const i = window.inventory.find(inv=>inv.id===l.itemId);
                    const e = window.employees.find(emp=>emp.id===l.employeeId);
                    const bName = (l.empName || e?.name || "").toLowerCase();
                    return !window.searchQuery || i?.name.toLowerCase().includes(window.searchQuery) || bName.includes(window.searchQuery) || i?.lnNumber?.toLowerCase().includes(window.searchQuery);
                });
                area.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">${renderStatCard('Total Units', window.inventory.length, 'box', 'bg-slate-100', 'text-black')}${renderStatCard('Out Now', actives.length, 'arrow-up-right', 'bg-red-50', 'text-[#CC0000]')}${renderStatCard('In Storage', window.inventory.filter(i=>i.status==='available').length, 'check-circle', 'bg-emerald-50', 'text-emerald-600')}${renderStatCard('Employees', window.employees.length, 'users', 'bg-blue-50', 'text-[#3c78e6]')}</div><div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 text-left"><h3 class="font-black text-black mb-6 uppercase text-[10px] tracking-[0.2em] italic border-b border-slate-50 pb-3">Live Overview</h3><div class="divide-y divide-slate-50">${qLoans.slice(0,12).map(l => {const i = window.inventory.find(inv=>inv.id===l.itemId); const dispBorrower = l.empName || window.employees.find(e=>e.id===l.employeeId)?.name || 'Former Staff'; return `<div class="py-3.5 text-sm flex justify-between items-center group"><div class="text-left"> <div class="font-black text-black uppercase tracking-tight group-hover:text-[#CC0000] transition-colors">${i?.name}</div><div class="text-[9px] text-slate-300 font-black uppercase tracking-widest mt-0.5">${i?.lnNumber || 'No ID'} • ${i?.serial || 'No SN'}</div></div><span class="text-white font-black text-[8px] uppercase tracking-widest bg-black px-3 py-1.5 rounded-full">${dispBorrower}</span></div>`}).join('') || '<div class="p-10 text-center text-slate-300 font-black text-[10px] tracking-widest uppercase">No active records found.</div>'}</div></div>`;
            } else if (window.currentView === 'inventory') {
                let groups = window.inventory.reduce((acc, i) => { if (!acc[i.name]) acc[i.name] = { name: i.name, count: 0, available: 0, cat: i.category, units: [] }; acc[i.name].count++; if (i.status === 'available') acc[i.name].available++; acc[i.name].units.push(i); return acc; }, {});
                let list = Object.values(groups);
                if (window.filters.cat !== 'All') list = list.filter(m => m.cat === window.filters.cat);
                if (window.searchQuery) {
                    list = list.filter(m => {
                        const nameMatch = m.name.toLowerCase().includes(window.searchQuery);
                        const unitMatch = m.units.some(u => {
                            const detailMatch = (u.lnNumber && u.lnNumber.toLowerCase().includes(window.searchQuery)) || (u.serial && u.serial.toLowerCase().includes(window.searchQuery));

                }
                list.sort((a,b) => (window.sort.dir === 'asc' ? 1 : -1) * (window.sort.field === 'name' ? a.name.localeCompare(b.name) : a.count - b.count));
                area.innerHTML = `<div class="bg-white rounded-3xl border shadow-sm overflow-hidden"><table class="w-full text-left"><thead class="bg-slate-100 text-[10px] uppercase font-black text-slate-500 border-b"><tr><th class="w-12 text-left"></th><th onclick="toggleSort('name')" class="px-6 py-4 sortable tracking-widest uppercase text-left">Item Info</th><th class="px-6 py-4 tracking-widest uppercase text-left">Availability</th><th class="hidden md:table-cell px-6 py-4 text-right pr-6 tracking-widest uppercase">Management</th></tr></thead><tbody class="divide-y divide-slate-50 text-left">${list.map(m => {const isEx = window.expandedInventoryModels.has(m.name); return `<tr onclick="toggleInventoryModel('${m.name}')" class="cursor-pointer hover:bg-slate-50 transition-colors"><td class="text-center"><i data-lucide="${isEx?'chevron-down':'chevron-right'}" class="w-5 h-5 ml-4 text-slate-300"></i></td><td class="px-6 py-4"><div class="font-black text-black text-sm uppercase italic tracking-tighter text-left">${m.name}</div><div class="text-[9px] font-black text-slate-300 uppercase tracking-widest mt-0.5 text-left">${m.cat}</div></td><td class="px-6 py-4"><span class="px-3 py-1 rounded-xl text-[9px] font-black uppercase tracking-widest ${m.available>0?'bg-emerald-50 text-emerald-700':'bg-red-50 text-red-700'}">${m.available} / ${m.count} Available</span></td><td class="hidden md:table-cell px-6 py-4 text-right pr-6 text-right">${m.available>0?`<button onclick="event.stopPropagation(); openBulkCheckout('${m.name}')" class="text-white font-black text-[8px] uppercase tracking-widest bg-black px-5 py-2 rounded-full hover:bg-[#CC0000] transition-all shadow-md">Bulk assignment</button>`:''}</td></tr>${isEx ? `<tr class="bg-slate-100/30"><td colspan="4" class="p-3 px-6 text-left"> <div class="relative max-w-sm mb-3"><i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-3 h-3 text-slate-300"></i><input type="text" placeholder="Filter units..." class="w-full pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-bold outline-none focus:ring-4 focus:ring-black/5" oninput="renderUnitSublist('${m.name}', this.value)" /></div> <table class="w-full text-left bg-white rounded-2xl shadow-sm overflow-hidden text-left"><tbody id="sublist-${m.name.replace(/\s+/g, '-')}"></tbody></table> </td></tr>` : ''}`;}).join('')}</tbody></table></div>`;
                list.forEach(m => { if (window.expandedInventoryModels.has(m.name)) window.renderUnitSublist(m.name, window.searchQuery || ''); });
            } else if (window.currentView === 'checkouts') {
                let fLoans = actives.map(l => { const i = window.inventory.find(inv=>inv.id===l.itemId); return {...l, iName: i?.name, iCat: i?.category, iLn: i?.lnNumber, iSn: i?.serial}; });
                if (window.filters.cat !== 'All') fLoans = fLoans.filter(l => l.iCat === window.filters.cat);
                if (window.searchQuery) fLoans = fLoans.filter(l => { const borrowerName = (l.empName || window.employees.find(e=>e.id===l.employeeId)?.name || "").toLowerCase(); return l.iName?.toLowerCase().includes(window.searchQuery) || borrowerName.includes(window.searchQuery) || l.iLn?.toLowerCase().includes(window.searchQuery) || l.iSn?.toLowerCase().includes(window.searchQuery); });
                const grouped = fLoans.reduce((acc, l) => { const name = l.empName || window.employees.find(e=>e.id===l.employeeId)?.name; if(!acc[l.employeeId]) acc[l.employeeId] = { eName: name, loans: [] }; acc[l.employeeId].loans.push(l); return acc; }, {});
                area.innerHTML = `<div class="bg-white rounded-3xl border shadow-sm overflow-hidden text-left"><table class="w-full text-left"><thead class="bg-slate-100 text-[10px] uppercase font-black text-slate-400 border-b text-left"><tr><th class="w-12"></th><th class="px-6 py-4 tracking-widest uppercase">Borrower Name</th><th class="px-6 py-4 text-right pr-6 tracking-widest uppercase">Items Assigned</th></tr></thead><tbody class="divide-y divide-slate-50 text-left">${Object.keys(grouped).map(id => `<tr onclick="toggleEmployeeGroup('${id}')" class="cursor-pointer hover:bg-slate-50 text-left"><td class="text-center"><i data-lucide="${window.expandedEmployees.has(id)?'chevron-down':'chevron-right'}" class="w-5 h-5 ml-4 text-slate-200"></i></td><td class="px-6 py-4 font-black text-black text-sm uppercase italic tracking-tighter text-left">${grouped[id].eName || 'User'}</td><td class="px-6 py-4 text-right font-black text-[#CC0000] text-sm italic pr-6 text-right">${grouped[id].loans.length} Units</td></tr>${window.expandedEmployees.has(id)?grouped[id].loans.map(l => `<tr class="bg-slate-50/40 text-left"><td></td><td class="px-6 py-3.5 border-l-[8px] border-black text-left"><div class="text-xs font-black text-slate-700 uppercase tracking-widest text-left">${l.iName}</div><div class="text-[9px] text-slate-300 font-black uppercase mt-0.5 tracking-[0.15em] text-left">ID: ${l.iLn || 'N/A'} • SN: ${l.iSn || 'N/A'}</div></td><td class="px-6 py-3.5 text-right pr-6"><button onclick="handleReturn('${l.id}')" class="text-white font-black text-[8px] uppercase tracking-widest bg-black px-5 py-2 rounded-full shadow-lg text-right">MARK RETURNED</button></td></tr>`).join(''):''}`).join('') || '<tr><td colspan="3" class="p-10 text-center text-slate-300 font-black text-[10px] uppercase tracking-widest italic text-left">No active loan records.</td></tr>'}</tbody></table></div>`;
            } else if (window.currentView === 'employees') {
                const emps = window.employees.filter(e => e.name.toLowerCase().includes(window.searchQuery) || e.department?.toLowerCase().includes(window.searchQuery)).sort((a,b)=>a.name.localeCompare(b.name));
                area.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-left">${emps.map(e => {const heldCount = actives.filter(c => c.employeeId === e.id).length; return `<div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col gap-4 relative group"><div class="absolute top-4 right-4 flex gap-2"><button onclick="openEmployeeModal('${e.id}')" class="p-1.5 bg-slate-50 rounded-lg text-slate-300 hover:text-black transition-colors shadow-sm"><i data-lucide="edit-2" class="w-3.5 h-3.5 text-left"></i></button><button onclick="initiateDelete('employee', '${e.id}')" class="p-1.5 bg-slate-50 rounded-lg text-slate-300 hover:text-[#CC0000] transition-colors shadow-sm"><i data-lucide="trash-2" class="w-3.5 h-3.5 text-left"></i></button></div><div><div class="w-12 h-12 bg-slate-100 text-black rounded-2xl flex items-center justify-center font-black text-xl mb-3 shadow-inner italic">${e.name[0]}</div><div class="font-black text-lg text-black leading-tight uppercase tracking-tighter italic text-left">${e.name}</div><div class="text-[10px] text-slate-300 uppercase font-black tracking-[0.1em] mt-1 text-left">${e.department || 'General Staff'}</div><div class="text-[9px] font-black text-white mt-4 bg-[#CC0000] inline-block px-4 py-1.5 rounded-full uppercase tracking-widest shadow-lg shadow-red-500/10 text-left">${heldCount} Assets Held</div></div> <div class="flex gap-2"> <button onclick="openEmployeeHistory('${e.id}')" class="flex-1 py-3 bg-black border-none rounded-2xl text-[9px] font-black text-white hover:bg-[#CC0000] uppercase tracking-widest transition-all flex items-center justify-center gap-2 shadow-xl"><i data-lucide="history" class="w-3.5 h-3.5"></i> Log</button> <button onclick="exportEmployeeReceipt('${e.id}')" class="flex-1 py-3 bg-[#3c78e6] border-none rounded-2xl text-[9px] font-black text-white hover:bg-[#2a5bbd] uppercase tracking-widest transition-all flex items-center justify-center gap-2 shadow-xl" title="Download Asset Receipt"><i data-lucide="download" class="w-3.5 h-3.5"></i> Receipt</button> </div> </div>`}).join('')}</div>`;
            }
            if (window.lucide) lucide.createIcons();
        };

        window.renderUnitSublist = (modelName, subSearch) => {
            const container = document.getElementById(`sublist-${modelName.replace(/\s+/g, '-')}`);
            if (!container) return;
            const units = window.inventory.filter(i => i.name === modelName);
            const currentActives = window.checkouts.filter(c => c.status === 'active');
            const filtered = units.filter(u => {
                const detailMatch = !subSearch || (u.lnNumber && u.lnNumber.toLowerCase().includes(subSearch.toLowerCase())) || (u.serial && u.serial.toLowerCase().includes(subSearch.toLowerCase()));
                const loan = currentActives.find(c => c.itemId === u.id);
                const borrowerName = loan ? (loan.empName || window.employees.find(e => e.id === loan.employeeId)?.name || "").toLowerCase() : "";
                const borrowerMatch = !subSearch || borrowerName.includes(subSearch.toLowerCase());
                return detailMatch || borrowerMatch;
            });

            container.innerHTML = filtered.map(u => {
                const loan = currentActives.find(c => c.itemId === u.id);
                const bName = loan ? (loan.empName || window.employees.find(e => e.id === loan.employeeId)?.name || 'User') : null;
                return `<tr class="border-b last:border-0 border-slate-50 text-left"><td class="px-6 py-3.5 text-left text-left"><div class="text-sm font-black text-slate-800 uppercase tracking-tight text-left">${u.lnNumber || 'NO ID'}</div><div class="text-[9px] text-slate-400 font-black uppercase tracking-widest mt-0.5 text-left">SN: ${u.serial || 'N/A'}</div></td><td class="px-6 py-3.5 text-left"><span class="text-[9px] font-black tracking-[0.15em] ${u.status==='available'?'text-emerald-500':'text-[#CC0000]'} uppercase italic text-left">${u.status==='available'?'IN STORAGE':`WITH ${bName}`}</span></td><td class="px-6 py-3.5 text-right pr-6 flex justify-end gap-3 text-right">
                    <button onclick="openUnitHistory('${u.id}')" class="p-1.5 text-slate-200 hover:text-black transition-colors" title="Logs"><i data-lucide="history" class="w-3.5 h-3.5 text-left"></i></button>
                    <button onclick="openItemModal('${u.id}')" class="p-1.5 text-slate-200 hover:text-black transition-colors" title="Edit"><i data-lucide="edit-2" class="w-3.5 h-3.5 text-left"></i></button>
                    <button onclick="initiateDelete('item', '${u.id}')" class="p-1.5 text-slate-200 hover:text-[#CC0000] transition-colors" title="Delete"><i data-lucide="trash-2" class="w-3.5 h-3.5 text-left"></i></button>
                    ${u.status==='available'?`<button onclick="openCheckoutModal('${u.id}')" class="ml-3 text-white font-black text-[8px] uppercase tracking-widest bg-[#3c78e6] px-4 py-2 rounded-xl shadow-lg">Assign</button>`:`<button onclick="handleReturn('${loan?.id}')" class="ml-3 text-white font-black text-[8px] uppercase tracking-widest bg-black px-4 py-2 rounded-xl shadow-lg">Return</button>`}
                </td></tr>`;
            }).join('') || '<tr><td colspan="3" class="p-6 text-center italic text-slate-300 font-black text-[9px] uppercase">No matching units.</td></tr>';
            if (window.lucide) lucide.createIcons();
        };

        window.toggleMobileAddMenu = () => document.getElementById('mobile-add-menu')?.classList.toggle('hidden');
        window.addEventListener('click', (e) => { const d = document.getElementById('add-dropdown'); if(d && !e.target.closest('#add-new-btn')) d.classList.add('hidden'); });
        init();
    </script>
</body>
</html>
